<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Reportes de Libros</title>
    <!-- Tailwind CSS v4 Browser Engine -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script>
        // Inyectamos la configuración de Tailwind 4 dinámicamente para evitar errores del linter de CSS
        const style = document.createElement('style');
        style.type = 'text/tailwindcss';
        style.textContent = `
            @theme {
                --dark-mode: selector(.dark);
            }
        `;
        document.head.appendChild(style);
    </script>
    <style type="text/css">
        :root {
            color-scheme: dark;
        }
        .modal-open {
            overflow: hidden;
        }
        .line-clamp-description {
            display: -webkit-box;
            -webkit-line-clamp: 10;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-900 min-h-screen p-4 md:p-8 text-gray-200">
    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-white mb-2">📚 Reportes de Libros</h1>
            <p id="bookCountContainer" class="text-lg text-gray-400 hidden">
                Mostrando: <span id="bookCount" class="font-semibold text-indigo-400">0</span> de <span id="totalCount" class="font-semibold text-gray-300">0</span> libros
            </p>
        </header>

        <div class="bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-700 mb-10 flex flex-col md:flex-row justify-center items-center gap-6">
            <div class="flex flex-col md:flex-row items-center gap-4">
                <label for="fileInput" class="font-medium text-gray-300">Seleccionar reporte JSON:</label>
                <input type="file" id="fileInput" accept=".json" class="block w-full md:w-auto text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-900/30 file:text-indigo-300 hover:file:bg-indigo-900/50 border border-gray-600 rounded-lg p-1">
            </div>
            
            <div class="flex items-center gap-3">
                <input type="checkbox" id="filterEditions" class="w-5 h-5 rounded border-gray-600 bg-gray-700 text-indigo-500 focus:ring-indigo-600 focus:ring-offset-gray-800 cursor-pointer">
                <label for="filterEditions" class="font-medium text-gray-300 cursor-pointer select-none">Solo con ediciones</label>
            </div>

            <div class="flex items-center gap-3">
                <label for="minBlogs" class="font-medium text-gray-300">Mencionado en:</label>
                <select id="minBlogs" class="bg-gray-700 border border-gray-600 text-gray-200 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2">
                    <option value="0">Cualquier cantidad</option>
                    <option value="1">1 o más blogs</option>
                    <option value="2">2 o más blogs</option>
                    <option value="3">3 o más blogs</option>
                    <option value="4">4 o más blogs</option>
                    <option value="5">5 o más blogs</option>
                </select>
            </div>

            <div id="blogFilterContainer" class="flex items-center gap-3 hidden">
                <label for="blogSelect" class="font-medium text-gray-300">Blog específico:</label>
                <select id="blogSelect" class="bg-gray-700 border border-gray-600 text-gray-200 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2 max-w-[200px]">
                    <option value="all">Todos los blogs</option>
                </select>
            </div>

            <div class="flex items-center gap-3">
                <label for="sortOrder" class="font-medium text-gray-300">Ordenar por:</label>
                <select id="sortOrder" class="bg-gray-700 border border-gray-600 text-gray-200 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2">
                    <option value="none">Sin orden</option>
                    <option value="pages-asc">Páginas: Menos a Más</option>
                    <option value="pages-desc">Páginas: Más a Menos</option>
                </select>
            </div>
        </div>

        <div id="bookGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
            <!-- Los libros se cargarán aquí -->
        </div>

        <div id="errorMessage" class="text-red-400 text-center mt-10 font-medium"></div>
    </div>

    <!-- Modal de Detalles -->
    <div id="bookModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm transition-opacity duration-300">
        <div class="bg-gray-800 border border-gray-700 rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-hidden shadow-2xl flex flex-col md:flex-row relative">
            <button id="closeModal" class="absolute top-4 right-4 text-gray-400 hover:text-white bg-gray-700/50 hover:bg-gray-700 p-2 rounded-full z-10 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            
            <!-- Portada en Modal -->
            <div class="w-full md:w-1/3 bg-gray-900 flex items-center justify-center p-6 border-b md:border-b-0 md:border-r border-gray-700">
                <img id="modalCover" src="" alt="" class="max-w-full max-h-full rounded-lg shadow-xl object-contain">
            </div>
            
            <!-- Info en Modal -->
            <div class="w-full md:w-2/3 p-6 md:p-8 overflow-y-auto custom-scrollbar">
                <h2 id="modalTitle" class="text-2xl md:text-3xl font-bold text-white mb-2"></h2>
                <p id="modalAuthor" class="text-lg text-indigo-400 font-medium mb-6"></p>
                
                <div class="grid grid-cols-2 gap-4 mb-8 bg-gray-900/50 p-4 rounded-xl border border-gray-700/50">
                    <div>
                        <span class="text-xs text-gray-500 uppercase font-bold tracking-wider">Rating Promedio</span>
                        <p id="modalRating" class="text-lg text-yellow-400 font-bold"></p>
                    </div>
                    <div>
                        <span class="text-xs text-gray-500 uppercase font-bold tracking-wider">Páginas</span>
                        <p id="modalPages" class="text-lg text-gray-200"></p>
                    </div>
                    <div>
                        <span class="text-xs text-gray-500 uppercase font-bold tracking-wider">Idioma</span>
                        <p id="modalLang" class="text-lg text-gray-200"></p>
                    </div>
                    <div>
                        <span class="text-xs text-gray-500 uppercase font-bold tracking-wider">Formato</span>
                        <p id="modalFormat" class="text-lg text-gray-200"></p>
                    </div>
                </div>

                <div class="mb-8">
                    <h3 class="text-sm text-gray-500 uppercase font-bold tracking-wider mb-2">Descripción</h3>
                    <p id="modalDescription" class="text-gray-300 leading-relaxed text-sm"></p>
                </div>

                <div class="mb-8">
                    <h3 class="text-sm text-gray-500 uppercase font-bold tracking-wider mb-2">Mencionado en</h3>
                    <div id="modalBlogs" class="flex flex-wrap gap-2"></div>
                </div>

                <div id="modalEditionsContainer" class="hidden">
                    <h3 class="text-sm text-gray-500 uppercase font-bold tracking-wider mb-3">Ediciones Encontradas</h3>
                    <div id="modalEditions" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const filterEditions = document.getElementById('filterEditions');
        const minBlogsSelect = document.getElementById('minBlogs');
        const blogSelect = document.getElementById('blogSelect');
        const blogFilterContainer = document.getElementById('blogFilterContainer');
        const bookGrid = document.getElementById('bookGrid');
        const errorMessage = document.getElementById('errorMessage');
        const bookCountContainer = document.getElementById('bookCountContainer');
        const bookCountSpan = document.getElementById('bookCount');
        const totalCountSpan = document.getElementById('totalCount');
        const sortOrderSelect = document.getElementById('sortOrder');

        // Modal Elements
        const bookModal = document.getElementById('bookModal');
        const closeModal = document.getElementById('closeModal');
        const modalCover = document.getElementById('modalCover');
        const modalTitle = document.getElementById('modalTitle');
        const modalAuthor = document.getElementById('modalAuthor');
        const modalRating = document.getElementById('modalRating');
        const modalPages = document.getElementById('modalPages');
        const modalLang = document.getElementById('modalLang');
        const modalFormat = document.getElementById('modalFormat');
        const modalDescription = document.getElementById('modalDescription');
        const modalBlogs = document.getElementById('modalBlogs');
        const modalEditions = document.getElementById('modalEditions');
        const modalEditionsContainer = document.getElementById('modalEditionsContainer');

        let allBooks = [];
        let availableBlogs = [];

        // Manejo de carga de archivos
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) { return; }

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    
                    // Manejar formato nuevo (objeto con metadata) o antiguo (array simple)
                    if (data && typeof data === 'object' && !Array.isArray(data)) {
                        allBooks = data.books || [];
                        availableBlogs = data.blogs || [];
                    } else {
                        allBooks = Array.isArray(data) ? data : [];
                        availableBlogs = [];
                    }

                    populateBlogFilter();
                    renderBooks();
                    errorMessage.textContent = '';
                } catch (err) {
                    console.error('Error al parsear JSON:', err);
                    errorMessage.textContent = `Error al leer el archivo JSON: ${err.message}`;
                    bookGrid.innerHTML = '';
                    bookCountContainer.classList.add('hidden');
                    allBooks = [];
                    availableBlogs = [];
                    populateBlogFilter();
                }
            };
            reader.onerror = () => {
                errorMessage.textContent = 'Error al leer el archivo del disco.';
            };
            reader.readAsText(file);
        });

        // Manejo de filtros
        [filterEditions, minBlogsSelect, blogSelect, sortOrderSelect].forEach(el => {
            el.addEventListener('change', renderBooks);
        });

        function populateBlogFilter() {
            // Limpiar opciones actuales (mantener "Todos")
            blogSelect.innerHTML = '<option value="all">Todos los blogs</option>';
            
            if (availableBlogs.length > 0) {
                availableBlogs.forEach(blog => {
                    const option = document.createElement('option');
                    option.value = blog.id;
                    option.textContent = blog.title;
                    blogSelect.appendChild(option);
                });
                blogFilterContainer.classList.remove('hidden');
            } else {
                blogFilterContainer.classList.add('hidden');
            }
        }

        function renderBooks() {
            bookGrid.innerHTML = '';
            
            if (!Array.isArray(allBooks)) {
                errorMessage.textContent = 'El archivo no contiene un array de libros válido.';
                bookCountContainer.classList.add('hidden');
                return;
            }

            const onlyWithEditions = filterEditions.checked;
            const minBlogs = parseInt(minBlogsSelect.value, 10) || 0;
            const selectedBlogId = blogSelect.value;

            const filteredBooks = allBooks.filter(book => {
                // Filtro de ediciones
                const passEditions = !onlyWithEditions || (Array.isArray(book.editionsFound) && book.editionsFound.length > 0);
                
                // Filtro de cantidad de blogs
                const blogCount = Array.isArray(book.blogs) ? book.blogs.length : (book.sourceBlogId ? 1 : 0);
                const passMinBlogs = blogCount >= minBlogs;

                // Filtro de blog específico
                let passSpecificBlog = true;
                if (selectedBlogId !== 'all') {
                    if (Array.isArray(book.blogs)) {
                        passSpecificBlog = book.blogs.some(b => b.id === selectedBlogId);
                    } else {
                        passSpecificBlog = book.sourceBlogId === selectedBlogId;
                    }
                }

                return passEditions && passMinBlogs && passSpecificBlog;
            });

            // Ordenación
            const sortOrder = sortOrderSelect.value;
            if (sortOrder === 'pages-asc' || sortOrder === 'pages-desc') {
                filteredBooks.sort((a, b) => {
                    const pagesA = parseInt(a.pageCount, 10) || 0;
                    const pagesB = parseInt(b.pageCount, 10) || 0;
                    
                    if (sortOrder === 'pages-asc') {
                        return pagesA - pagesB;
                    } else {
                        return pagesB - pagesA;
                    }
                });
            }

            bookCountSpan.textContent = filteredBooks.length;
            totalCountSpan.textContent = allBooks.length;
            bookCountContainer.classList.remove('hidden');

            const fragment = document.createDocumentFragment();

            filteredBooks.forEach(book => {
                const card = document.createElement('div');
            card.className = 'bg-gray-800 rounded-lg shadow-md border border-gray-700 overflow-hidden hover:shadow-lg hover:shadow-indigo-900/40 hover:border-indigo-500/50 transition-all duration-300 flex flex-col relative cursor-pointer group';
            card.dataset.id = book.id;
            card.addEventListener('click', () => showBookDetails(book));
                
                const coverUrl = book.coverImage || 'https://via.placeholder.com/200x300?text=Sin+Portada';
                const editionsCount = Array.isArray(book.editionsFound) ? book.editionsFound.length : 0;
                
                // Manejar blogs (formato nuevo vs antiguo)
                let blogsHtml = '';
                if (Array.isArray(book.blogs) && book.blogs.length > 0) {
                    blogsHtml = `
                        <div class="mt-2 flex flex-wrap gap-1">
                            ${book.blogs.map(blog => `
                                <span class="text-[9px] bg-gray-700 text-gray-300 px-1.5 py-0.5 rounded border border-gray-600 truncate max-w-full" title="${blog.title}">
                                    ${blog.title}
                                </span>
                            `).join('')}
                        </div>
                    `;
                } else if (book.sourceBlogId) {
                    blogsHtml = `
                        <div class="mt-2">
                            <span class="text-[9px] bg-gray-700 text-gray-300 px-1.5 py-0.5 rounded border border-gray-600">
                                Blog: ${book.sourceBlogId}
                            </span>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="aspect-[2/3] w-full overflow-hidden bg-gray-700 relative">
                        <img src="${coverUrl}" alt="${book.title || 'Libro'}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" loading="lazy" onerror="this.src='https://via.placeholder.com/200x300?text=Error+Img'">
                        <div class="absolute inset-0 bg-gradient-to-t from-gray-900/80 via-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-3">
                            <span class="text-[10px] text-white font-bold bg-indigo-600 px-2 py-1 rounded">VER DETALLES</span>
                        </div>
                        ${editionsCount > 0 ? `
                            <div class="absolute top-2 right-2 bg-indigo-600 text-white text-[10px] font-bold px-2 py-1 rounded-full shadow-lg">
                                ${editionsCount} EDICIONES
                            </div>
                        ` : ''}
                    </div>
                    <div class="p-3 flex-grow flex flex-col">
                        <h2 class="text-sm font-bold line-clamp-2 text-white leading-tight mb-1 group-hover:text-indigo-300 transition-colors" title="${book.title || ''}">${book.title || 'Sin título'}</h2>
                        <p class="text-xs text-gray-400 truncate">${book.author || 'Autor desconocido'}</p>
                        ${blogsHtml}
                    </div>
                `;
                
                fragment.appendChild(card);
            });

            bookGrid.appendChild(fragment);

            if (filteredBooks.length === 0 && allBooks.length > 0) {
                bookGrid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500">No hay libros que coincidan con el filtro.</div>';
            }
        }

        function showBookDetails(book) {
            modalTitle.textContent = book.titleComplete || book.title || 'Sin título';
            modalAuthor.textContent = book.author || 'Autor desconocido';
            modalCover.src = book.coverImage || 'https://via.placeholder.com/200x300?text=Sin+Portada';
            modalCover.alt = book.title || 'Portada';
            
            modalRating.textContent = book.averageRating ? `⭐ ${book.averageRating}` : 'N/A';
            modalPages.textContent = book.pageCount || 'Desconocido';
            modalLang.textContent = book.language || 'Desconocido';
            modalFormat.textContent = book.format || 'Desconocido';
            
            modalDescription.textContent = book.description || 'Sin descripción disponible.';
            
            // Blogs
            modalBlogs.innerHTML = '';
            const bookBlogs = Array.isArray(book.blogs) ? book.blogs : [];
            if (bookBlogs.length > 0) {
                bookBlogs.forEach(blog => {
                    const tag = document.createElement('a');
                    tag.href = blog.url;
                    tag.target = '_blank';
                    tag.className = 'text-xs bg-gray-700 hover:bg-indigo-900 text-gray-300 hover:text-white px-2 py-1 rounded border border-gray-600 transition-colors';
                    tag.textContent = blog.title;
                    modalBlogs.appendChild(tag);
                });
            } else if (book.sourceBlogId) {
                const tag = document.createElement('span');
                tag.className = 'text-xs bg-gray-700 text-gray-300 px-2 py-1 rounded border border-gray-600';
                tag.textContent = book.sourceBlogId;
                modalBlogs.appendChild(tag);
            }

            // Ediciones
            modalEditions.innerHTML = '';
            const editions = Array.isArray(book.editionsFound) ? book.editionsFound : [];
            if (editions.length > 0) {
                editions.forEach(edition => {
                    const div = document.createElement('div');
                    div.className = 'flex gap-3 bg-gray-900/80 p-3 rounded-lg border border-gray-700 hover:border-indigo-500/40 transition-colors group/ed';
                    div.innerHTML = `
                        <img src="${edition.coverImage || 'https://via.placeholder.com/50x75?text=Img'}" class="w-12 h-[72px] object-cover rounded shadow shadow-black" loading="lazy">
                        <div class="flex-grow flex flex-col justify-center min-w-0">
                            <h4 class="text-xs font-bold text-gray-200 line-clamp-1 group-hover/ed:text-white">${edition.title}</h4>
                            <p class="text-[11px] text-gray-400 mt-0.5">${edition.language} • ${edition.format || '?'}</p>
                            <a href="https://www.goodreads.com${edition.link}" target="_blank" class="text-[10px] text-indigo-400 hover:text-indigo-300 underline mt-1 font-semibold">Ver en Goodreads</a>
                        </div>
                        <div class="flex flex-col items-end justify-center">
                            <span class="text-[11px] text-yellow-500 font-bold">⭐ ${edition.averageRating || 'N/A'}</span>
                            <span class="text-[10px] text-gray-500">${edition.pages || '?'} pág.</span>
                        </div>
                    `;
                    modalEditions.appendChild(div);
                });
                modalEditionsContainer.classList.remove('hidden');
            } else {
                modalEditionsContainer.classList.add('hidden');
            }

            bookModal.classList.remove('hidden');
            document.body.classList.add('modal-open');
        }

        // Close Modal logic
        function closeBookModal() {
            bookModal.classList.add('hidden');
            document.body.classList.remove('modal-open');
        }

        closeModal.addEventListener('click', closeBookModal);
        bookModal.addEventListener('click', (e) => {
            if (e.target === bookModal) { closeBookModal(); }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !bookModal.classList.contains('hidden')) { closeBookModal(); }
        });
    </script>
</body>
</html>
