<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Reportes de Libros</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script>
        const style = document.createElement('style');
        style.type = 'text/tailwindcss';
        style.textContent = `
            @theme {
                --dark-mode: selector(.dark);
            }
        `;
        document.head.appendChild(style);
    </script>
    <style type="text/css">
        :root {
            color-scheme: dark;
        }
        .modal-open {
            overflow: hidden;
        }
        .line-clamp-description {
            display: -webkit-box;
            -webkit-line-clamp: 10;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(31, 41, 55, 0.5);
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.4);
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.6);
        }
        /* Modal transition */
        #bookModal {
            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
        }
        #bookModal.active {
            opacity: 1;
            pointer-events: auto;
        }
        #bookModal .modal-content {
            transform: scale(0.95) translateY(12px);
            transition: transform 0.25s ease;
        }
        #bookModal.active .modal-content {
            transform: scale(1) translateY(0);
        }
        /* Drag & drop */
        .drop-zone.dragging {
            border-color: rgb(99, 102, 241) !important;
            background: rgba(99, 102, 241, 0.08) !important;
        }
        /* Rating stars gradient */
        .star-fill {
            background: linear-gradient(135deg, #f59e0b, #eab308);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-950 min-h-screen text-gray-200">

    <div class="max-w-7xl mx-auto px-4 md:px-8 py-6 md:py-10">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight">Reportes de Libros</h1>
            <p id="bookCountContainer" class="text-sm text-gray-500 mt-2 hidden">
                <span id="bookCount" class="font-semibold text-indigo-400">0</span> / <span id="totalCount" class="font-semibold text-gray-400">0</span> libros
            </p>
        </header>

        <!-- Empty State / Drop Zone -->
        <div id="emptyState" class="drop-zone border-2 border-dashed border-gray-700 rounded-2xl p-12 md:p-20 text-center mb-10 transition-colors duration-200">
            <div class="flex flex-col items-center gap-4">
                <svg class="w-16 h-16 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" />
                </svg>
                <p class="text-gray-400 text-lg font-medium">Arrastra un archivo JSON aqui</p>
                <p class="text-gray-600 text-sm">o selecciona uno manualmente</p>
                <label for="fileInput" class="mt-2 inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold px-5 py-2.5 rounded-lg cursor-pointer transition-colors shadow-lg shadow-indigo-900/30">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    Seleccionar archivo
                </label>
                <input type="file" id="fileInput" accept=".json" class="hidden">
            </div>
        </div>

        <!-- Toolbar (hidden until data loaded) -->
        <div id="toolbar" class="hidden mb-8 space-y-3">
            <!-- Search + file change -->
            <div class="flex flex-col md:flex-row gap-3">
                <div class="relative flex-grow">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input type="text" id="searchInput" placeholder="Buscar por titulo o autor..." class="w-full bg-gray-900 border border-gray-700 text-gray-200 text-sm rounded-lg pl-10 pr-4 py-2.5 focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 placeholder-gray-600 outline-none transition-colors">
                </div>
                <label for="fileInput" class="inline-flex items-center gap-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-300 text-sm font-medium px-4 py-2.5 rounded-lg cursor-pointer transition-colors whitespace-nowrap">
                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    Cambiar archivo
                </label>
            </div>

            <!-- Filters row -->
            <div class="flex flex-wrap items-center gap-3 bg-gray-900/60 border border-gray-800 rounded-xl px-4 py-3">
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="filterEditions" class="w-4 h-4 rounded border-gray-600 bg-gray-700 text-indigo-500 focus:ring-indigo-600 focus:ring-offset-gray-900 cursor-pointer">
                    <label for="filterEditions" class="text-sm text-gray-400 cursor-pointer select-none">Solo con ediciones</label>
                </div>

                <span class="hidden md:block w-px h-5 bg-gray-700"></span>

                <div class="flex items-center gap-2">
                    <label for="minBlogs" class="text-sm text-gray-500">Blogs:</label>
                    <select id="minBlogs" class="bg-gray-800 border border-gray-700 text-gray-300 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 px-2 py-1.5 outline-none">
                        <option value="0">Todos</option>
                        <option value="1">1+</option>
                        <option value="2">2+</option>
                        <option value="3">3+</option>
                        <option value="4">4+</option>
                        <option value="5">5+</option>
                    </select>
                </div>

                <div id="blogFilterContainer" class="flex items-center gap-2 hidden">
                    <label for="blogSelect" class="text-sm text-gray-500">Blog:</label>
                    <select id="blogSelect" class="bg-gray-800 border border-gray-700 text-gray-300 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 px-2 py-1.5 max-w-[180px] outline-none">
                        <option value="all">Todos</option>
                    </select>
                </div>

                <span class="hidden md:block w-px h-5 bg-gray-700"></span>

                <div class="flex items-center gap-2">
                    <label for="sortOrder" class="text-sm text-gray-500">Orden:</label>
                    <select id="sortOrder" class="bg-gray-800 border border-gray-700 text-gray-300 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 px-2 py-1.5 outline-none">
                        <option value="none">Sin orden</option>
                        <option value="pages-asc">Paginas ↑</option>
                        <option value="pages-desc">Paginas ↓</option>
                        <option value="rating-desc">Rating ↓</option>
                        <option value="rating-asc">Rating ↑</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Book Grid -->
        <div id="bookGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-5"></div>

        <div id="errorMessage" class="text-red-400 text-center mt-10 font-medium"></div>
    </div>

    <!-- Modal -->
    <div id="bookModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="modal-content bg-gray-900 border border-gray-700/80 rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-hidden shadow-2xl shadow-black/50 flex flex-col md:flex-row relative">
            <button id="closeModal" class="absolute top-3 right-3 text-gray-500 hover:text-white bg-gray-800/80 hover:bg-gray-700 p-1.5 rounded-full z-10 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <!-- Cover -->
            <div class="w-full md:w-[280px] shrink-0 bg-gray-950 flex items-center justify-center p-6 border-b md:border-b-0 md:border-r border-gray-800">
                <img id="modalCover" src="" alt="" class="max-w-full max-h-[380px] rounded-lg shadow-2xl shadow-black/60 object-contain">
            </div>

            <!-- Info -->
            <div class="flex-grow p-6 md:p-8 overflow-y-auto custom-scrollbar">
                <h2 id="modalTitle" class="text-xl md:text-2xl font-bold text-white mb-1 leading-tight"></h2>
                <p id="modalAuthor" class="text-sm text-indigo-400 font-medium mb-5"></p>

                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
                    <div class="bg-gray-800/60 rounded-lg p-3 border border-gray-800">
                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-wider block mb-1">Rating</span>
                        <p id="modalRating" class="text-sm text-yellow-400 font-bold"></p>
                    </div>
                    <div class="bg-gray-800/60 rounded-lg p-3 border border-gray-800">
                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-wider block mb-1">Paginas</span>
                        <p id="modalPages" class="text-sm text-gray-200"></p>
                    </div>
                    <div class="bg-gray-800/60 rounded-lg p-3 border border-gray-800">
                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-wider block mb-1">Idioma</span>
                        <p id="modalLang" class="text-sm text-gray-200"></p>
                    </div>
                    <div class="bg-gray-800/60 rounded-lg p-3 border border-gray-800">
                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-wider block mb-1">Formato</span>
                        <p id="modalFormat" class="text-sm text-gray-200"></p>
                    </div>
                </div>

                <div class="mb-6">
                    <h3 class="text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-2">Descripcion</h3>
                    <p id="modalDescription" class="text-gray-400 leading-relaxed text-sm"></p>
                </div>

                <div class="mb-6">
                    <h3 class="text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-2">Mencionado en</h3>
                    <div id="modalBlogs" class="flex flex-wrap gap-2"></div>
                </div>

                <div id="modalEditionsContainer" class="hidden">
                    <h3 class="text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-3">Ediciones Encontradas</h3>
                    <div id="modalEditions" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const filterEditions = document.getElementById('filterEditions');
        const minBlogsSelect = document.getElementById('minBlogs');
        const blogSelect = document.getElementById('blogSelect');
        const blogFilterContainer = document.getElementById('blogFilterContainer');
        const bookGrid = document.getElementById('bookGrid');
        const errorMessage = document.getElementById('errorMessage');
        const bookCountContainer = document.getElementById('bookCountContainer');
        const bookCountSpan = document.getElementById('bookCount');
        const totalCountSpan = document.getElementById('totalCount');
        const sortOrderSelect = document.getElementById('sortOrder');
        const searchInput = document.getElementById('searchInput');
        const emptyState = document.getElementById('emptyState');
        const toolbar = document.getElementById('toolbar');

        const bookModal = document.getElementById('bookModal');
        const closeModal = document.getElementById('closeModal');
        const modalCover = document.getElementById('modalCover');
        const modalTitle = document.getElementById('modalTitle');
        const modalAuthor = document.getElementById('modalAuthor');
        const modalRating = document.getElementById('modalRating');
        const modalPages = document.getElementById('modalPages');
        const modalLang = document.getElementById('modalLang');
        const modalFormat = document.getElementById('modalFormat');
        const modalDescription = document.getElementById('modalDescription');
        const modalBlogs = document.getElementById('modalBlogs');
        const modalEditions = document.getElementById('modalEditions');
        const modalEditionsContainer = document.getElementById('modalEditionsContainer');

        let allBooks = [];
        let availableBlogs = [];
        let searchDebounce = null;

        // Drag & Drop
        ['dragenter', 'dragover'].forEach(evt => {
            emptyState.addEventListener(evt, (e) => {
                e.preventDefault();
                emptyState.classList.add('dragging');
            });
        });
        ['dragleave', 'drop'].forEach(evt => {
            emptyState.addEventListener(evt, (e) => {
                e.preventDefault();
                emptyState.classList.remove('dragging');
            });
        });
        emptyState.addEventListener('drop', (e) => {
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.json')) {
                loadFile(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) loadFile(file);
        });

        function loadFile(file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);

                    if (data && typeof data === 'object' && !Array.isArray(data)) {
                        allBooks = data.books || [];
                        availableBlogs = data.blogs || [];
                    } else {
                        allBooks = Array.isArray(data) ? data : [];
                        availableBlogs = [];
                    }

                    emptyState.classList.add('hidden');
                    toolbar.classList.remove('hidden');
                    populateBlogFilter();
                    renderBooks();
                    errorMessage.textContent = '';
                } catch (err) {
                    console.error('Error al parsear JSON:', err);
                    errorMessage.textContent = `Error al leer el archivo JSON: ${err.message}`;
                    bookGrid.innerHTML = '';
                    bookCountContainer.classList.add('hidden');
                    allBooks = [];
                    availableBlogs = [];
                    populateBlogFilter();
                }
            };
            reader.onerror = () => {
                errorMessage.textContent = 'Error al leer el archivo del disco.';
            };
            reader.readAsText(file);
        }

        // Filters
        [filterEditions, minBlogsSelect, blogSelect, sortOrderSelect].forEach(el => {
            el.addEventListener('change', renderBooks);
        });

        searchInput.addEventListener('input', () => {
            clearTimeout(searchDebounce);
            searchDebounce = setTimeout(renderBooks, 200);
        });

        function populateBlogFilter() {
            blogSelect.innerHTML = '<option value="all">Todos</option>';

            if (availableBlogs.length > 0) {
                availableBlogs.forEach(blog => {
                    const option = document.createElement('option');
                    option.value = blog.id;
                    option.textContent = blog.title;
                    blogSelect.appendChild(option);
                });
                blogFilterContainer.classList.remove('hidden');
            } else {
                blogFilterContainer.classList.add('hidden');
            }
        }

        function normalize(str) {
            return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        }

        function renderBooks() {
            bookGrid.innerHTML = '';

            if (!Array.isArray(allBooks)) {
                errorMessage.textContent = 'El archivo no contiene un array de libros valido.';
                bookCountContainer.classList.add('hidden');
                return;
            }

            const onlyWithEditions = filterEditions.checked;
            const minBlogs = parseInt(minBlogsSelect.value, 10) || 0;
            const selectedBlogId = blogSelect.value;
            const query = normalize(searchInput.value.trim());

            const filteredBooks = allBooks.filter(book => {
                const passEditions = !onlyWithEditions || (Array.isArray(book.editionsFound) && book.editionsFound.length > 0);

                const blogCount = Array.isArray(book.blogs) ? book.blogs.length : (book.sourceBlogId ? 1 : 0);
                const passMinBlogs = blogCount >= minBlogs;

                let passSpecificBlog = true;
                if (selectedBlogId !== 'all') {
                    if (Array.isArray(book.blogs)) {
                        passSpecificBlog = book.blogs.some(b => b.id === selectedBlogId);
                    } else {
                        passSpecificBlog = book.sourceBlogId === selectedBlogId;
                    }
                }

                let passSearch = true;
                if (query) {
                    const title = normalize(book.title || '');
                    const author = normalize(book.author || '');
                    passSearch = title.includes(query) || author.includes(query);
                }

                return passEditions && passMinBlogs && passSpecificBlog && passSearch;
            });

            // Sort
            const sortOrder = sortOrderSelect.value;
            if (sortOrder !== 'none') {
                filteredBooks.sort((a, b) => {
                    if (sortOrder === 'pages-asc' || sortOrder === 'pages-desc') {
                        const pA = parseInt(a.pageCount, 10) || 0;
                        const pB = parseInt(b.pageCount, 10) || 0;
                        return sortOrder === 'pages-asc' ? pA - pB : pB - pA;
                    }
                    if (sortOrder === 'rating-desc' || sortOrder === 'rating-asc') {
                        const rA = parseFloat(a.averageRating) || 0;
                        const rB = parseFloat(b.averageRating) || 0;
                        return sortOrder === 'rating-desc' ? rB - rA : rA - rB;
                    }
                    return 0;
                });
            }

            bookCountSpan.textContent = filteredBooks.length;
            totalCountSpan.textContent = allBooks.length;
            bookCountContainer.classList.remove('hidden');

            const fragment = document.createDocumentFragment();

            filteredBooks.forEach(book => {
                const card = document.createElement('div');
                card.className = 'bg-gray-900 rounded-xl border border-gray-800 overflow-hidden hover:border-indigo-500/50 transition-all duration-300 flex flex-col relative cursor-pointer group';
                card.addEventListener('click', () => showBookDetails(book));

                const coverUrl = book.coverImage || '';
                const editionsCount = Array.isArray(book.editionsFound) ? book.editionsFound.length : 0;
                const rating = book.averageRating ? parseFloat(book.averageRating).toFixed(1) : null;
                const pages = book.pageCount ? parseInt(book.pageCount, 10) : null;
                const blogCount = Array.isArray(book.blogs) ? book.blogs.length : (book.sourceBlogId ? 1 : 0);

                const coverHtml = coverUrl
                    ? `<img src="${coverUrl}" alt="${book.title || 'Libro'}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'flex items-center justify-center h-full text-gray-600\\'>Sin portada</div>'">`
                    : `<div class="flex items-center justify-center h-full text-gray-700 text-xs">Sin portada</div>`;

                card.innerHTML = `
                    <div class="aspect-[2/3] w-full overflow-hidden bg-gray-800 relative">
                        ${coverHtml}
                        <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-2.5">
                            <span class="text-[10px] text-white font-bold bg-indigo-600/90 px-2 py-1 rounded">VER DETALLES</span>
                        </div>
                        ${editionsCount > 0 ? `
                            <div class="absolute top-1.5 right-1.5 bg-indigo-600 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full shadow">
                                ${editionsCount} ed.
                            </div>
                        ` : ''}
                        ${blogCount > 1 ? `
                            <div class="absolute top-1.5 left-1.5 bg-emerald-600 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full shadow">
                                ${blogCount} blogs
                            </div>
                        ` : ''}
                    </div>
                    <div class="p-2.5 flex-grow flex flex-col gap-1">
                        <h2 class="text-xs font-bold line-clamp-2 text-white leading-snug group-hover:text-indigo-300 transition-colors" title="${book.title || ''}">${book.title || 'Sin titulo'}</h2>
                        <p class="text-[11px] text-gray-500 truncate">${book.author || 'Autor desconocido'}</p>
                        <div class="mt-auto pt-1.5 flex items-center justify-between text-[10px] text-gray-600">
                            ${rating ? `<span class="text-yellow-500 font-semibold">${rating} ★</span>` : '<span></span>'}
                            ${pages ? `<span>${pages} pag.</span>` : ''}
                        </div>
                    </div>
                `;

                fragment.appendChild(card);
            });

            bookGrid.appendChild(fragment);

            if (filteredBooks.length === 0 && allBooks.length > 0) {
                bookGrid.innerHTML = `
                    <div class="col-span-full text-center py-20">
                        <svg class="w-12 h-12 text-gray-700 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                        <p class="text-gray-600">No hay libros que coincidan con los filtros.</p>
                    </div>
                `;
            }
        }

        function showBookDetails(book) {
            modalTitle.textContent = book.titleComplete || book.title || 'Sin titulo';
            modalAuthor.textContent = book.author || 'Autor desconocido';
            modalCover.src = book.coverImage || 'https://via.placeholder.com/200x300?text=Sin+Portada';
            modalCover.alt = book.title || 'Portada';

            modalRating.textContent = book.averageRating ? `${book.averageRating} ★` : 'N/A';
            modalPages.textContent = book.pageCount || '—';
            modalLang.textContent = book.language || '—';
            modalFormat.textContent = book.format || '—';

            modalDescription.textContent = book.description || 'Sin descripcion disponible.';

            // Blogs
            modalBlogs.innerHTML = '';
            const bookBlogs = Array.isArray(book.blogs) ? book.blogs : [];
            if (bookBlogs.length > 0) {
                bookBlogs.forEach(blog => {
                    const tag = document.createElement('a');
                    tag.href = blog.url;
                    tag.target = '_blank';
                    tag.className = 'text-xs bg-gray-800 hover:bg-indigo-900/60 text-gray-400 hover:text-white px-2.5 py-1 rounded-md border border-gray-700 transition-colors';
                    tag.textContent = blog.title;
                    modalBlogs.appendChild(tag);
                });
            } else if (book.sourceBlogId) {
                const tag = document.createElement('span');
                tag.className = 'text-xs bg-gray-800 text-gray-400 px-2.5 py-1 rounded-md border border-gray-700';
                tag.textContent = book.sourceBlogId;
                modalBlogs.appendChild(tag);
            }

            // Editions
            modalEditions.innerHTML = '';
            const editions = Array.isArray(book.editionsFound) ? book.editionsFound : [];
            if (editions.length > 0) {
                editions.forEach(edition => {
                    const div = document.createElement('div');
                    div.className = 'flex gap-3 bg-gray-800/50 p-2.5 rounded-lg border border-gray-800 hover:border-indigo-500/30 transition-colors';
                    div.innerHTML = `
                        <img src="${edition.coverImage || 'https://via.placeholder.com/50x75?text=Img'}" class="w-10 h-[60px] object-cover rounded shadow shadow-black/40" loading="lazy">
                        <div class="flex-grow flex flex-col justify-center min-w-0">
                            <h4 class="text-xs font-semibold text-gray-300 line-clamp-1">${edition.title}</h4>
                            <p class="text-[11px] text-gray-500 mt-0.5">${edition.language} · ${edition.format || '?'} · ${edition.pages || '?'} pag.</p>
                            <a href="https://www.goodreads.com${edition.link}" target="_blank" class="text-[10px] text-indigo-400 hover:text-indigo-300 underline mt-0.5 font-medium">Goodreads →</a>
                        </div>
                        <div class="flex items-center">
                            <span class="text-xs text-yellow-500 font-bold">${edition.averageRating || '—'} ★</span>
                        </div>
                    `;
                    modalEditions.appendChild(div);
                });
                modalEditionsContainer.classList.remove('hidden');
            } else {
                modalEditionsContainer.classList.add('hidden');
            }

            // Show with animation
            bookModal.classList.remove('hidden');
            requestAnimationFrame(() => {
                bookModal.classList.add('active');
            });
            document.body.classList.add('modal-open');
        }

        function closeBookModal() {
            bookModal.classList.remove('active');
            setTimeout(() => {
                bookModal.classList.add('hidden');
            }, 250);
            document.body.classList.remove('modal-open');
        }

        closeModal.addEventListener('click', closeBookModal);
        bookModal.addEventListener('click', (e) => {
            if (e.target === bookModal) closeBookModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && bookModal.classList.contains('active')) closeBookModal();
        });
    </script>
</body>
</html>
